<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Monithelly Simões | Portfólio de Dados</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --purple-50: #f3f0ff;
      --purple-100: #dfd8ff;
      --purple-200: #c5b9ff;
      --purple-400: #8b78ea;
      --purple-600: #5a49c6;
      --purple-800: #3b2f8e;
      --gray-50: #fafaf8;
      --gray-100: #ece9e2;
      --gray-200: #d9d4ca;
      --gray-400: #7d7a73;
      --gray-700: #3f3c38;
      --ink: #191724;
      --white: #ffffff;
      --shadow: 0 18px 45px rgba(42, 33, 100, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray-50);
      color: var(--ink);
      overflow-x: hidden;
    }

    a { color: inherit; }

    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1rem 3rem;
      background: rgba(250, 250, 248, 0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid rgba(0,0,0,0.04);
    }

    .nav-logo { text-decoration: none; display: flex; align-items: center; }
    .nav-logo svg { width: 208px; height: auto; }

    .nav-links {
      list-style: none;
      display: flex;
      gap: 2rem;
      align-items: center;
    }

    .nav-links a {
      text-decoration: none;
      font-size: 13px;
      color: var(--gray-400);
      transition: 0.2s ease;
    }

    .nav-links a:hover { color: var(--purple-600); }

    .lang-switch {
      border: 1px solid var(--gray-200);
      border-radius: 999px;
      padding: 0.45rem 0.85rem;
    }

    .hero {
      padding: 9rem 3rem 5rem;
      min-height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    .hero::before {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 78% 25%, rgba(90, 73, 198, 0.12), transparent 28%),
                  radial-gradient(circle at 15% 80%, rgba(139, 120, 234, 0.10), transparent 30%);
      pointer-events: none;
    }

    .hero-inner {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 1160px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 4rem;
      align-items: center;
    }

    .hero-card {
      background: transparent;
      border: none;
      border-radius: 0;
      padding: 0;
      box-shadow: none;
      display: flex;
      justify-content: center;
    }

    .hero-photo {
      width: 280px;
      height: 280px;
      object-fit: cover;
      object-position: center; /* corrigido */
      border-radius: 50%;
      border: 2px solid var(--purple-100);
      margin-bottom: 0;
    }

    section { padding: 5.5rem 3rem; }

    .categories {
      background: #fff;
      border-top: 1px solid var(--gray-100);
      border-bottom: 1px solid var(--gray-100);
    }

    .categories-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .category-card {
      background: var(--white);
      border: 1px solid var(--gray-100);
      border-radius: 24px;
      padding: 1.5rem;
      text-decoration: none;
      transition: 0.25s ease;
      box-shadow: 0 10px 30px rgba(22, 18, 45, 0.03);
    }

    .category-card h3 {
      font-family: 'Lora', serif;
      font-size: 1.45rem;
      font-weight: 400;
      margin-bottom: 0.8rem;
      line-height: 1.2;
    }
  </style>
</head>

<body>

<section class="hero" id="home">
  <div class="hero-inner">
    <aside class="hero-card">
      <img
        src="https://media.licdn.com/dms/image/v2/D4E03AQEsVaodzpo2CQ/profile-displayphoto-scale_400_400/B4EZsniO55GoAg-/0/1765894844830?e=1775692800&v=beta&t=JnLmJpfiTp3zqnGAanUYoujuYi2-D_mIM4C8hUYRHcI"
        alt="Monithelly Simões"
        class="hero-photo"
      />
    </aside>
  </div>
</section>

<section class="categories" id="categorias">
  <div class="categories-grid">

    <a class="category-card" href="dashboards.html">
      <h3>Dashboards</h3>
      <p>Visualizações e painéis em Power BI</p>
    </a>

    <a class="category-card" href="analises.html">
      <h3>Case de negócio</h3>
      <p>Estudos analíticos e leitura de contexto</p>
    </a>

    <a class="category-card" href="automacoes.html">
      <h3>Data Ops / Automação</h3>
      <p>Automações, integrações e monitoramento com dados</p>
    </a>

    <a class="category-card" href="documentacao.html">
      <h3>Documentação</h3>
      <p>Estrutura, lógica e organização dos projetos</p>
    </a>

  </div>
</section>

</body>
</html>
