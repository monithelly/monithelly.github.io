<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Cases de Negócio | Monithelly Simões</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    :root {
      --purple-50: #f3f0ff;
      --purple-100: #dfd8ff;
      --purple-200: #c5b9ff;
      --purple-400: #8b78ea;
      --purple-600: #5a49c6;
      --gray-50: #fafaf8;
      --gray-100: #ece9e2;
      --gray-400: #7d7a73;
      --ink: #191724;
      --shadow: 0 18px 45px rgba(42, 33, 100, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--gray-50);
      color: var(--ink);
    }

    a { color: inherit; text-decoration: none; }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 1rem 3rem;
      background: rgba(250,250,248,0.9);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid #eee;
      z-index: 10;
    }

    .hero {
      padding: 9rem 3rem 4rem;
      background: linear-gradient(180deg, rgba(243,240,255,0.55) 0%, rgba(250,250,248,1) 75%);
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 3rem;
      margin-bottom: 1rem;
    }

    .subtitle {
      color: var(--gray-400);
      margin-bottom: 2rem;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: 0.25s ease;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: var(--shadow);
    }

    .card img {
      width: 100%;
      aspect-ratio: 16/10;
      object-fit: cover;
    }

    .card-body {
      padding: 1.2rem;
    }

    .card-title {
      font-family: 'Lora', serif;
      font-size: 1.4rem;
      margin-bottom: 0.5rem;
    }

    .card-desc {
      font-size: 0.95rem;
      color: var(--gray-400);
    }

    footer {
      margin-top: 4rem;
      padding: 2rem;
      background: var(--ink);
      color: #d8d0ff;
      text-align: center;
    }

    @media (max-width: 900px) {
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>

<body>

<nav>
  <div>Monithelly</div>
  <div>
    <a href="index.html">Home</a>
  </div>
</nav>

<div class="hero">
  <div class="container">
    <h1>Cases de negócio</h1>
    <p class="subtitle">
      Análises com foco em entender o problema e direcionar decisão.
    </p>

    <div class="grid">

      <!-- DISTRIMAX -->
      <a class="card" href="distrimax.html">
        <img src="distrimax.png" alt="Case Distrimax">
        <div class="card-body">
          <div class="card-title">Distrimax</div>
          <div class="card-desc">
            Estoque parado e ruptura ao mesmo tempo. Análise de causa e impacto.
          </div>
        </div>
      </a>

    </div>
  </div>
</div>

<footer>
  © 2026 Monithelly Simões · Portfólio de dados
</footer>

</body>
</html>
