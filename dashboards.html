<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboards | Monithelly Simões</title>

  <!-- fontes -->
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'DM Sans', sans-serif;
      background: #fafaf8;
      margin: 0;
      color: #191724;
    }

    nav {
      position: fixed;
      top: 0;
      width: 100%;
      background: rgba(250,250,248,0.9);
      backdrop-filter: blur(10px);
      display: flex;
      justify-content: space-between;
      padding: 1rem 3rem;
      border-bottom: 1px solid #eee;
      z-index: 10;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 7rem 2rem 4rem;
    }

    h1 {
      font-family: 'Lora', serif;
      font-size: 2.8rem;
      margin-bottom: 0.5rem;
    }

    .subtitle {
      color: #7d7a73;
      margin-bottom: 3rem;
    }

    .nav-projects {
      display: flex;
      gap: 1rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
    }

    .nav-projects a {
      text-decoration: none;
      padding: 0.5rem 1rem;
      border-radius: 999px;
      border: 1px solid #ddd;
      font-size: 0.9rem;
    }

    .dashboard {
      margin-bottom: 4rem;
    }

    .dashboard h2 {
      font-family: 'Lora', serif;
      font-size: 1.8rem;
      margin-bottom: 1rem;
    }

    iframe {
      width: 100%;
      height: 420px;
      border-radius: 16px;
      border: none;
      box-shadow: 0 15px 40px rgba(0,0,0,0.05);
    }

    .back {
      text-decoration: none;
      font-size: 0.9rem;
      color: #5a49c6;
    }

  </style>
</head>

<body>

<nav>
  <div>Monithelly</div>
  <a href="index.html" class="back">← Voltar</a>

    Painéis desenvolvidos em Power BI com foco em negócio, leitura clara e apoio à decisão.
  </p>

  <!-- navegação entre projetos -->
  <div class="nav-projects">

    <a href="#logistica">Tech Logística</a>
